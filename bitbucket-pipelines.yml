image: node:24

pipelines:
  branches:
    main:
      - step:
          name: Build & Deploy
          caches:
            - node
          script:
            - apt-get update -qq && apt-get install -y -qq rsync > /dev/null
            - npm ci
            - npm test
            - npm run build
            - VERSION=$(node -e "console.log(require('./package.json').version)")
            - DEPLOYED=$(curl -sf https://web-opt.com/version.txt || echo "")
            - |
              if [ "$VERSION" = "$DEPLOYED" ]; then
                echo "Version $VERSION already deployed, skipping."
                exit 0
              fi
            - rsync -az --delete --exclude='.git' --exclude='node_modules' --exclude='vendor' --exclude='storage' --exclude='.env' ./ deploy@web-opt.com:/var/www/web-opt.com/releases/$VERSION/
            - ssh deploy@web-opt.com "deploy-switch web-opt.com $VERSION"
            - sleep 2
            - |
              LIVE=$(curl -sf https://web-opt.com/version.txt || echo "")
              if [ "$LIVE" = "$VERSION" ]; then
                echo "Deployed $VERSION successfully"
              else
                echo "Expected $VERSION but got '$LIVE'"
                exit 1
              fi
